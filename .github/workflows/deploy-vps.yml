name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yangi-choy-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build on GitHub and reload VPS
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web
        run: npm run build --workspace=web
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/vps_key
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Update VPS source checkout
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vps_key "$VPS_USER@$VPS_HOST" \
            "git config --global --add safe.directory '$VPS_APP_DIR' && cd '$VPS_APP_DIR' && git fetch --quiet origin main && git reset --hard --quiet '$GITHUB_SHA'"

      - name: Sync Next build artifact to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/vps_key" \
            apps/web/.next/ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/apps/web/.next/"

      - name: Install runtime dependencies and reload PM2
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vps_key "$VPS_USER@$VPS_HOST" \
            "timeout 180 bash -lc 'cd $VPS_APP_DIR && npm install --omit=dev --no-audit --no-fund --package-lock=false && git reset --hard --quiet $GITHUB_SHA && pm2 reload yangi-choy --update-env >/tmp/yangi-choy-pm2-reload.log 2>&1'"

      - name: Smoke test
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/vps_key "$VPS_USER@$VPS_HOST" \
            "curl -fsS -o /tmp/yangi-choy-smoke.json 'http://127.0.0.1:3000/api/sheets?range=Kurs&filterColumn=Kurs_ID&filterValue=__github_actions_missing__' && cat /tmp/yangi-choy-smoke.json"
